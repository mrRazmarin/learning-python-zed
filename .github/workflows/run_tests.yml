name: Run API Tests # Название пайплайна, которое будет видно во вкладке Actions

# Триггеры:
on:
  push:
    branches: [ "main", "master", "develop" ] # При пуше в эти ветки
  pull_request:
    branches: [ "main", "master" ] # При создании Pull Request в эти ветки

jobs:
  test-api:
    name: Run Pytests # Название задачи (Job)
    runs-on: ubuntu-latest # Запуск на виртуальной машине Linux (бесплатно для GitHub)

    steps:
    # Шаг 1: Клонирование кода репозитория на виртуальную машину
    - name: Checkout code
      uses: actions/checkout@v4

    # Шаг 2: Установка Python
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13' # Версия Python

    # Шаг 3: Установка библиотек
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        # На всякий случай ставим allure-cli, чтобы генерировать отчет прямо в CI
        pip install allure-pytest 

    - name: Start Petstore API
      run: docker compose up -d

    - name: Wait for API
      run: sleep 15 # Пауза, пока поднимается java

    # Шаг 4: Запуск тестов
    - name: Run Tests with Allure
      env:
        PETSTORE_URL: http://localhost:8080/v2
      run: |
        # Запускаем pytest. Результаты складываем в папку allure_results
        pytest --alluredir=allure_results

    # Шаг 5: Загрузка артефакта (Allure Results)
    # Это позволит нам скачать результаты и открыть их локально
    - name: Upload Allure Results
      if: always() # Выполнить этот шаг даже если тесты упали
      uses: actions/upload-artifact@v4
      with:
        name: allure-results # Имя архива для скачивания
        path: allure_results # Папка с данными
        retention-days: 30 # Хранить 30 дней

    - name: Stop Petstore
      if: always()
      run: docker compose down